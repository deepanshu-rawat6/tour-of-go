apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: greetings.greeting.example.com
spec:
  group: greeting.example.com
  names:
    kind: Greeting
    listKind: GreetingList
    plural: greetings
    singular: greeting
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  minLength: 1
            status:
              type: object
              properties:
                configMapName:
                  type: string
                ready:
                  type: boolean
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Message
          type: string
          jsonPath: .spec.message
        - name: Ready
          type: boolean
          jsonPath: .status.ready
